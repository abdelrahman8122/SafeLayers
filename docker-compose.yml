version: '3.9'

# ─────────────────────────────────────────────────────
#  SafeLayers — docker-compose.yml
#  Run with: docker-compose up --build
# ─────────────────────────────────────────────────────

services:

  # ── MongoDB ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: safelayers-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_me_before_running}
      MONGO_INITDB_DATABASE: safelayers
    volumes:
      - mongo_data:/data/db
      - ./devops/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - safelayers-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safelayers-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change_me_before_running}@mongo:27017/safelayers?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_access_secret}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace_with_a_long_random_refresh_secret}
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_PREAUTH_EXPIRES_IN: 5m
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-replace_with_a_long_random_totp_encryption_key}
      BCRYPT_ROUNDS: 12
      FRONTEND_URL: http://localhost
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - safelayers-net
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health',r=>r.statusCode===200?process.exit(0):process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safelayers-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - safelayers-net

# ── Networks ──────────────────────────────────────────
networks:
  safelayers-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local
