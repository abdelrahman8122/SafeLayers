# ─────────────────────────────────────────────────────
#  SafeLayers — CI/CD Pipeline
#  Triggers on: push to main/develop, pull requests
#
#  Stages:
#   1. Lint & Unit Tests
#   2. SAST — Static Application Security Testing
#   3. Build Docker images
#   4. DAST — Dynamic Application Security Testing
#   5. Deploy (main branch only)
# ─────────────────────────────────────────────────────

name: SafeLayers CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── 1. Lint & Test ─────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci
          JWT_REFRESH_SECRET: test_refresh_ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

  # ── 2. SAST — Static Security Scan ────────────────
  sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # npm audit — check for known CVEs in dependencies
      - name: npm audit (backend)
        run: |
          cd backend && npm ci
          npm audit --audit-level=high
        continue-on-error: false  # BLOCKS deployment on high/critical CVEs

      - name: npm audit (frontend)
        run: |
          cd frontend && npm ci
          npm audit --audit-level=high
        continue-on-error: false

      # CodeQL — semantic code analysis for security bugs
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      # Trivy — filesystem vulnerability scan
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # BLOCKS deployment on critical findings

  # ── 3. Build Docker Images ─────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: sast
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest

      # Trivy — scan built Docker images for CVEs
      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          severity: 'CRITICAL'
          exit-code: '1'

  # ── 4. DAST — Dynamic Security Testing ────────────
  dast:
    name: DAST — OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        run: |
          docker-compose up -d
          sleep 20  # Wait for services to be ready

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: true  # BLOCKS deployment on alerts

      - name: Tear down
        run: docker-compose down

  # ── 5. Deploy ──────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, dast]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/safelayers
            git pull origin main
            docker-compose pull
            docker-compose up -d --no-deps
            docker system prune -f
