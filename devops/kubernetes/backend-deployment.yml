# ─────────────────────────────────────────────────────
#  SafeLayers — Kubernetes Backend Deployment
#  Applies: kubectl apply -f devops/kubernetes/
# ─────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: safelayers-backend
  namespace: safelayers
  labels:
    app: safelayers-backend
    tier: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safelayers-backend
  template:
    metadata:
      labels:
        app: safelayers-backend
        tier: backend
        version: v1
      annotations:
        # Istio sidecar injection — enables mTLS between pods
        sidecar.istio.io/inject: "true"
    spec:
      # Security: run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: backend
          image: ghcr.io/group8/safelayers-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

          # Security context per container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          # Environment variables from Kubernetes secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: safelayers-secrets
                  key: mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: safelayers-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: safelayers-secrets
                  key: jwt-refresh-secret
            - name: BCRYPT_ROUNDS
              value: "12"

          # Resource limits — prevent resource exhaustion attacks
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Liveness & readiness probes
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

      # Ensure pods spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: safelayers-backend

---
apiVersion: v1
kind: Service
metadata:
  name: safelayers-backend
  namespace: safelayers
spec:
  selector:
    app: safelayers-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP  # Internal only — not exposed outside cluster
